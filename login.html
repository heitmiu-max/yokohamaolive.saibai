<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード認証 - Yokohama olive</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: #ffffff;
            padding: 40px 20px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            width: 100%;
            max-width: 260px; /* PC・スマホでバランスのいい最大幅 */
            height: auto;
            margin-bottom: 25px;
        }
        .login-box h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: #333;
            letter-spacing: 0.05em;
        }
        .login-box p {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 25px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #558b57;
        }
        button {
            width: 100%;
            background-color: #558b57; /* オリーブグリーン */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #3e6b40;
        }
        #error-message {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="https://heitmiu-max.github.io/yokohamaolive.saibai/Main-Logo_HOR.png" alt="Yokohama olive" class="logo">

    <h2>ACCESS RESTRICTED</h2>
    <p>認証が必要です。パスワードを入力してください。</p>
    
    <input type="password" id="passwordInput" placeholder="Password" autofocus>
    <button onclick="checkPassword()">認証して進む</button>
    
    <div id="error-message">パスワードが正しくありません</div>
</div>

<script>
    function checkPassword() {
        // 設定用：パスワードと遷移先URL
        const correctPassword = "設定したいパスワード"; 
        const targetURL = "https://移動させたいURL"; 

        const input = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("error-message");

        if (input === correctPassword) {
            window.location.href = targetURL;
        } else {
            errorMsg.style.display = "block";
            document.getElementById("passwordInput").value = ""; // 入力をリセット
        }
    }

    // Enterキーでも送信できるようにする設定
    document.getElementById("passwordInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    });
</script>

</body>
</html>
