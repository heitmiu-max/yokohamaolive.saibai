<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクセス制限 - Yokohama olive</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background-color: #ffffff;
            padding: 40px 20px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        .logo {
            width: 100%;
            max-width: 260px;
            height: auto;
            margin-bottom: 25px;
        }
        .login-box h2 {
            margin-top: 0;
            font-size: 1.3rem;
            color: #333;
            letter-spacing: 0.1em;
        }
        .login-box p {
            font-size: 0.9rem;
            color: #777;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px; /* iPhoneでズームされないためのサイズ */
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #558b57;
        }
        button {
            width: 100%;
            background-color: #558b57;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #3e6b40;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src=https://heitmiu-max.github.io/yokohamaolive.saibai/map/logo.png alt="Yokohama olive" class="logo">

    <h2>アクセス制限</h2>
    <p>認証が必要です。<br>パスワードを入力してください。</p>
    
    <input type="password" id="passwordInput" placeholder="パスワードを入力" autofocus>
    <button onclick="checkPassword()">認証して進む</button>
</div>

<script>
    function checkPassword() {
        // --- 設定項目 ---
        const correctPassword = "設定したいパスワード"; 
        const baseTargetURL = "https://移動させたい遷移先URL"; 
        // ----------------

        const inputField = document.getElementById("passwordInput");
        const password = inputField.value;

        if (password === correctPassword) {
            // 現在のURLから「?」以降のパラメータを取得
            const queryString = window.location.search;
            
            // 遷移先URLにパラメータを結合してジャンプ
            // 例: baseTargetURLが index.html で パラメータが ?user=1 の場合、index.html?user=1 になります
            window.location.href = baseTargetURL + queryString;
            
        } else {
            // 間違えた場合のアラート
            alert("パスワードが正しくありません。");
            
            // 入力内容を消去してフォーカスを戻す
            inputField.value = "";
            inputField.focus();
        }
    }

    // Enterキー対応
    document.getElementById("passwordInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") checkPassword();
    });
</script>

</body>
</html>
