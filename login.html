<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワード認証 - Yokohama olive</title>
    <style>
        /* 画面全体のスタイル */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        /* 白い入力パネルのスタイル */
        .login-box {
            background-color: #ffffff;
            padding: 40px 20px 30px; /* 上部の余白を少し広めに */
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        /* ★追加：ロゴのスタイル */
        .logo {
            width: 100%;
            max-width: 260px; /* PCで見ても大きすぎないバランスの良いサイズ */
            height: auto;
            margin-bottom: 25px; /* 下の文字との余白 */
        }
        .login-box h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: #333;
        }
        .login-box p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 20px;
        }
        /* パスワード入力欄 */
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        /* 送信ボタン（ロゴのグリーンに合わせて色を変更しました） */
        button {
            width: 100%;
            background-color: #558b57; /* Yokohama oliveのグリーンに近い色 */
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #3e6b40; /* マウスオーバーで少し暗いグリーンに */
        }
        /* エラーメッセージ（最初は非表示） */
        #error-message {
            color: #d9534f;
            font-size: 0.85rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="Main-Logo_HOR.png" alt="Yokohama olive" class="logo">

    <h2>アクセス制限</h2>
    <p>このページを開くにはパスワードを入力してください。</p>
    
    <input type="password" id="passwordInput" placeholder="パスワード">
    <button onclick="checkPassword()">開く</button>
    
    <div id="error-message">パスワードが間違っています。</div>
</div>

<script>
    function checkPassword() {
        // ▼▼ ここに設定したいパスワードを入力してください ▼▼
        const correctPassword = "secretpassword123"; 
        
        // ▼▼ ここに移動させたいURLを入力してください ▼▼
        const targetURL = "https://example.com"; 

        const input = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("error-message");

        if (input === correctPassword) {
            window.location.href = targetURL;
        } else {
            errorMsg.style.display = "block";
        }
    }
</script>

</body>
</html>
